# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'

jobs:
  build:

    runs-on: macos-26

    steps:
    - uses: actions/checkout@v7
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
