name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to build and upload, for example v2.2.0"
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-please:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.tag_name == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-dmg:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || inputs.tag_name != '') }}
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}

      - name: Run tests
        run: swift test -v

      - name: Build DMG
        env:
          TAG_NAME: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          make dmg VERSION="${VERSION}" BUILD_VERSION="${GITHUB_RUN_NUMBER}"
          hdiutil verify "dist/SSHTunnel-v${VERSION}-macos26-arm64.dmg"

      - name: Upload DMG
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          gh release view "${TAG_NAME}" >/dev/null 2>&1 || \
            gh release create "${TAG_NAME}" --title "${TAG_NAME}" --notes "Release assets for ${TAG_NAME}"
          gh release upload "${TAG_NAME}" "dist/SSHTunnel-v${VERSION}-macos26-arm64.dmg" --clobber
